<!DOCTYPE html>

    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="text/css"

<body>

    <header class="nav flex space-between container pt-10">

        </a>

        <!-- bouton burger -->
        <button id="burgerBtn" class="burger-btn ph ph-list"></button>

        <nav class="flex gap-12 align-center" id="navMenu">

            <a href="mailto:contact.ludivinebocqueir@gmail.com" class="inactive-link ml-20 contact-link">Contact</a>

            <div class="swiper mySwiper swiperHome">

    <footer class="mt-50">

        <div class=" mt-10 gap-12 txt-center">
